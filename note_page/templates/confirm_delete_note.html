{% extends "base.html" %}

{% block title %}Delete Note | Study Helper{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Delete Note</h1>
</div>

<div class="card shadow-sm">
    <div class="card-body text-center py-5">
        <h4 class="mb-3">Are you sure you want to delete "{{ note.title }}"?</h4>
        <p class="text-muted mb-4">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'note_view' note.note_id %}" class="btn btn-outline-secondary mr-3">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
    </div>
</div>
{% endblock %}
